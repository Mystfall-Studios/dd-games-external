<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Access Restricted</title>

<style>
  :root {
    --bg: #f8f9fb;
    --card-bg: #fff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --accent: #d93b32;
    --green: #16a34a;
  }
  body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Inter", Arial, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    border-radius: 10px;
    padding: 40px 50px;
    width: min(400px, 90%);
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    color: var(--green);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 10px;
  }
  p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 0 24px;
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.88; }

  /* === TOS MODAL === */
  #tosOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  #tosBox {
    background: white;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  #tosBox h2 { margin: 0 0 12px; font-size: 18px; }
  #tosContent {
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 15px;
    flex: 1;
    color: var(--text);
  }
  .tosButtons {
    display: flex;
    gap: 10px;
  }
  .tosButtons button { margin: 0; }
  .tosButtons button.secondary {
    background: #6b7280;
  }
</style>
</head>
<body>

<div class="card">
  <div class="badge">🔓 Password-Free Access</div>
  <h1>Welcome to DD Games</h1>
  <p>
    DD Games is now <strong>password-less</strong>! No password needed to get in.<br>
    Just agree to our TOS and enjoy the site!
  </p>
  <button onclick="handleEnter()">Continue to DD Games →</button>
</div>

<!-- TOS Modal -->
<div id="tosOverlay" style="display:none;">
  <div id="tosBox">
    <h2>DD Games — Terms of Service</h2>
    <div id="tosContent">Loading...</div>
    <div class="tosButtons">
      <button onclick="acceptTOS()">✅ Accept</button>
      <button class="secondary" onclick="declineTOS()">Decline</button>
    </div>
  </div>
</div>

<script>
  const TOS_KEY = "tosAccepted";

  function loadListPage() {
    fetch("/dd-games/main.html")
      .then(res => res.text())
      .then(html => {
        document.documentElement.innerHTML = html;
        requestAnimationFrame(() => {
          Array.from(document.querySelectorAll("script")).forEach(oldScript => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            if (oldScript.innerHTML) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
        });
      })
      .catch(() => alert("Failed to load main.html"));
  }

  function showTOS() {
    fetch("/dd-games/TOS.md")
      .then(res => res.text())
      .then(text => {
        document.getElementById("tosContent").textContent = text;
        document.getElementById("tosOverlay").style.display = "flex";
      })
      .catch(() => {
        document.getElementById("tosContent").textContent = "Unable to load Terms of Service.";
        document.getElementById("tosOverlay").style.display = "flex";
      });
  }

  function acceptTOS() {
    localStorage.setItem(TOS_KEY, "true");
    loadListPage();
  }

  function declineTOS() {
    window.close();
    document.body.innerHTML = "<h1 style='font-family:Arial;text-align:center;margin-top:20vh;'>Access denied.</h1>";
  }

  function handleEnter() {
    if (localStorage.getItem(TOS_KEY) === "true") {
      loadListPage();
    } else {
      showTOS();
    }
  }
</script>

</body>
</html>
