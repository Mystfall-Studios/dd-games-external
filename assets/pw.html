<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Access Restricted</title>

<style>
  :root {
    --bg: #f8f9fb;
    --card-bg: #fff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --accent: #d93b32;
  }
  body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Inter", Arial, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    border-radius: 10px;
    padding: 40px 50px;
    width: min(400px, 90%);
    text-align: center;
    z-index: 1;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    font-size: 15px;
  }
  button {
    width: 100%;
    margin-top: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 0;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error {
    color: #c53030;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* === TOS MODAL === */
  #tosOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  #tosBox {
    background: white;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  #tosContent {
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 14px;
    border: 1px solid var(--border);
    padding: 10px;
    margin-bottom: 15px;
  }
  .tosButtons {
    display: flex;
    gap: 10px;
  }
</style>

<!-- Firebase (kept for alt password logging) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAT-oK3scrUg7Jt1tEQk6b7IP2-ah1OcCc",
    authDomain: "dd-games-6aa54.firebaseapp.com",
    databaseURL: "https://dd-games-6aa54-default-rtdb.firebaseio.com",
    projectId: "dd-games-6aa54",
    storageBucket: "dd-games-6aa54.firebasestorage.app",
    messagingSenderId: "26805694246",
    appId: "1:26805694246:web:dd9bce62c16fbfc762dbe7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

</head>
<body>

<div class="card">
  <h1>Access Restricted</h1>
  <p>Please enter the password to continue.</p>
  <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
  <button id="continueBtn" onclick="checkPassword()">Continue</button>
  <div id="error" class="error">Password Incorrect</div>
</div>

<!-- TOS Modal -->
<div id="tosOverlay">
  <div id="tosBox">
    <h2>DD Games - Terms of Service</h2>
    <div id="tosContent">Loading...</div>
    <div class="tosButtons">
      <button onclick="acceptTOS()">Accept</button>
      <button onclick="declineTOS()">Decline</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://lqfcntoldutgkzaboqfk.supabase.co";
  const TOS_KEY = "tosAccepted";
  const ACCESS_TOKEN_KEY = "ddAccessToken";

  // ── Load main page ──────────────────────────────────────
 // ── Load main page ──────────────────────────────────────
  function loadListPage() {
    fetch("/dd-games/main.html")
      .then(res => res.text())
      .then(html => {
        // 1. Swap out the HTML cleanly
        document.documentElement.innerHTML = html;

        // 2. Browsers block <script> tags loaded via innerHTML from running for security reasons.
        // To fix this, we loop through any script tags in the new HTML, recreate them, and inject them properly.
        Array.from(document.querySelectorAll("script")).forEach(oldScript => {
          const newScript = document.createElement("script");
          
          // Copy all attributes (like src, defer, type)
          Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          
          // Copy any inline code inside the script
          if (oldScript.innerHTML) {
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
          }
          
          // Replace the dead script with the live one so it executes
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
      })
      .catch(() => alert("Failed to load main.html"));
  }

  // ── TOS ─────────────────────────────────────────────────
  function showTOS() {
    fetch("/dd-games/TOS.md")
      .then(res => res.text())
      .then(text => {
        document.getElementById("tosContent").textContent = text;
        document.getElementById("tosOverlay").style.display = "flex";
      })
      .catch(() => {
        document.getElementById("tosContent").textContent = "Unable to load Terms of Service.";
        document.getElementById("tosOverlay").style.display = "flex";
      });
  }

  function acceptTOS() {
    localStorage.setItem(TOS_KEY, "true");
    loadListPage();
  }

  function declineTOS() {
    window.close();
    document.body.innerHTML = "<h1>Access denied</h1>";
  }

  // ── Firebase alt log ────────────────────────────────────
  async function logAltPassword() {
    const res = await fetch("https://api.ipify.org?format=json");
    const { ip } = await res.json();
    const entry = { ip, time: new Date().toISOString() };
    db.ref("altLogs").push(entry);
    db.ref("altCount").transaction(n => (n || 0) + 1);
  }

  // ── Password check (server-side) ────────────────────────
  async function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim();
    const error = document.getElementById("error");
    const btn = document.getElementById("continueBtn");

    error.style.display = "none";
    if(!input) return;

    // Disable button while waiting so it can't be spammed
    btn.disabled = true;
    btn.textContent = "Checking...";

    let data;
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/check-password`, {
      method: "POST",
      headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer sb_publishable_Zs0J8nka95CzLZJ7BWqEAg_sqD5Wr0d"
      },
     body: JSON.stringify({ password: input })
    });
      data = await res.json();
    } catch(e) {
      error.textContent = "Connection error. Please try again.";
      error.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Continue";
      return;
    }

    if(!data.success) {
      error.textContent = "Password Incorrect";
      error.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Continue";
      return;
    }

    // Store the signed server token — not the password
    localStorage.setItem(ACCESS_TOKEN_KEY, data.token);

    // Log if alt password was used
    if(data.alt) await logAltPassword();

    if(localStorage.getItem(TOS_KEY) === "true") {
      loadListPage();
    } else {
      showTOS();
    }
  }

  document.getElementById("passwordInput").addEventListener("keypress", e => {
    if(e.key === "Enter") checkPassword();
  });
</script>

</body>
</html>
